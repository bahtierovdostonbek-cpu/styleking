<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мой сайт</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
    }

    header {
      padding: 20px;
      background: #1f1f1f;
      font-size: 24px;
    }

    .container {
      padding: 40px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #4CAF50;
      color: white;
    }

    button:hover {
      background: #45a049;
    }
  </style>
</head>
<body>

<header>
  🚀 Мой первый сайт
</header>

<div class="container">
  <h1>Привет!</h1>
  <p>Это мой первый сайт, сделанный с нуля 😎</p>

  <button onclick="showMessage()">Нажми меня</button>
</div>

<script>
  function showMessage() {
    alert("Ты нажал кнопку! 🔥");
  }
</script>

</body>
</html>
